<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StackFlow LiteGraph Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="node_modules/litegraph.js/css/litegraph.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            zoom: 0.9;
            /* Expand body so that after 0.9 zoom it fills the viewport exactly */
            width: calc(100vw / 0.9);
            height: calc(100vh / 0.9);
        }

        #editor-container {
            width: 100%;
            height: 100%;
        }

        #main-canvas {
            display: block;
        }

        .toolbar {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(40, 40, 40, 0.9);
            padding: 5px 10px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            transition: border-radius 0.2s ease;
        }

        .graph-name-btn {
            display: flex;
            align-items: center;
            gap: 0;
            background: #2a2a2a;
            border: 1px solid #4a4a4a;
            border-radius: 5px;
            padding: 3px 10px 3px 8px;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            cursor: pointer;
            color: #ccc;
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.15s, border-color 0.15s;
        }
        .graph-name-btn:hover,
        .graph-name-btn.open {
            background: #333;
            border-color: #6366f1;
            color: #e2e8f0;
        }
        .graph-name-folder {
            color: #6b7280;
            font-size: 11px;
        }
        .graph-name-folder:not(:empty)::after {
            content: "/";
            margin: 0 1px;
        }
        .graph-name-base {
            color: #e2e8f0;
        }
        .graph-name-btn[data-unsaved="1"] .graph-name-base {
            color: #f59e0b;
        }

        #restart-required-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: rgba(30,25,10,0.92);
            border-bottom: 2px solid rgba(245,158,11,0.5);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 200;
            backdrop-filter: blur(12px);
        }
        #restart-required-banner span {
            font-size: 14px;
            color: #fbbf24;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        #restart-required-banner button {
            background: rgba(245,158,11,0.25);
            color: #fbbf24;
            border: 1px solid rgba(245,158,11,0.5);
            border-radius: 5px;
            padding: 6px 18px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        #restart-required-banner button:hover { background: rgba(245,158,11,0.45); }
        #breadcrumb-bar {
            position: absolute;
            top: 48px;
            left: 10px;
            z-index: 9;
            background: rgba(30, 30, 30, 0.9);
            padding: 4px 12px;
            border-radius: 0 0 8px 8px;
            display: none;
            /* Hidden by default */
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            border-top: none;
            min-width: 200px;
        }

        button {
            background: #3a3a3a;
            color: #eee;
            border: 1px solid #555;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #4a4a4a;
            border-color: #666;
        }

        button.primary {
            background: #3b82f6;
            border-color: #2563eb;
        }

        button.primary:hover {
            background: #2563eb;
        }

    </style>
</head>

<body>
    <div class="toolbar">
        <input type="hidden" id="graph-selector">
        <button id="graph-name-btn" class="graph-name-btn" title="Browse graphs">
            <span class="graph-name-folder"></span><span class="graph-name-base">No graph loaded</span>
        </button>
        <button id="save-graph-backend" style="background: #8b5cf6; border-color: #7c3aed; padding: 4px 12px;">💾
            Save</button>
        <button id="new-graph" style="background: #3b82f6; border-color: #2563eb; padding: 4px 12px;">🆕 New</button>
        <div style="border-left: 1px solid #444; margin: 0 5px;"></div>
        <button id="add-start" style="background: #065f46; border-color: #047857;">+ Start</button>
        <button id="auto-layout" style="background: #1e3a5f; border-color: #2d5986; padding: 4px 12px;">⊞ Auto Layout</button>
        <div style="border-left: 1px solid #444; margin: 0 5px;"></div>
        <div id="session-info" style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #999;">
            <span>Session:</span>
            <input id="session-input" list="session-list" placeholder="session_id"
                style="background: transparent; color: #eee; border: 1px solid #555; border-radius: 4px; padding: 2px 6px; font-size: 12px; font-family: monospace; width: 100px;">
            <datalist id="session-list"></datalist>
            <button id="new-session" style="padding: 2px 8px; font-size: 11px;">New Session</button>
        </div>
        <div style="border-left: 1px solid #444; margin: 0 5px;"></div>
        <div class="execution-controls" style="display: flex; gap: 6px;">
            <button id="run-graph" class="primary" style="background: #10b981; border-color: #059669;">▶ Run</button>
            <button id="rerun-graph" style="background: #8b5cf6; border-color: #7c3aed;">🔄 Rerun</button>
            <button id="stop-graph" style="background: #ef4444; border-color: #dc2626;">⏹ Stop</button>
            <button id="step-back-btn" style="background: #f59e0b; border-color: #d97706;">⏮ Step Back</button>
            <button id="clear-graph" style="background: #6b7280; border-color: #4b5563;">🧹 Clear State</button>
            <button id="restart-server" style="background: #444; border-color: #666;">🔌 Restart Server</button>
        </div>
    </div>
    <div id="restart-required-banner" style="display:none;">
        <span>⚠ Server restart required — modules were changed.</span>
        <button id="restart-required-btn">Restart Now</button>
    </div>
    <div id="breadcrumb-bar">
        <div id="breadcrumbs"
            style="display: flex; align-items: center; gap: 8px; font-size: 11px; color: #aaa; overflow-x: auto; white-space: nowrap;">
        </div>
    </div>
    <div id="editor-container">
        <canvas id="main-canvas"></canvas>
    </div>

    <!-- Graph Zoom Slider (Bottom, next to logs) -->
    <div id="graph-zoom-bar">
        <button id="zoom-out-btn" title="Zoom Out">−</button>
        <input type="range" id="graph-zoom-slider" min="10" max="300" value="100" step="1">
        <button id="zoom-in-btn" title="Zoom In">+</button>
        <span id="zoom-label">100%</span>
    </div>

    <!-- Execution Logs (Bottom Middle) -->
    <div id="log-container" class="expanded">
        <div class="resize-handle top"></div>
        <div class="log-header">
            <span>Execution Logs</span>
            <button id="toggle-logs">Collapse</button>
        </div>
        <div id="log-content"></div>
    </div>

    <!-- Right Sidebar (Initial State & Running Sessions) -->
    <div id="right-sidebar">
        <div id="right-sidebar-toggler">
            <span>Tools & Sessions</span>
            <button id="toggle-right-sidebar" style="padding: 2px 8px; font-size: 11px;">Collapse Sidebar</button>
        </div>

        <div id="debug-controls-container">
            <div class="debug-controls-header">
                <span>Tools</span>
            </div>
            <div style="padding: 6px 8px; display: flex; flex-direction: row; gap: 6px;">
                <button id="debug-mode" title="Debug mode OFF" style="flex: 1; background: #1e3a2e; border-color: #22c55e; color: #22c55e; font-weight: 600; font-size: 12px; padding: 5px 10px; text-align: left;">🐛 Debug Mode: OFF</button>
                <button id="open-package-manager" style="flex: 1; background: #1e293b; border-color: #334155; color: #94a3b8; font-size: 12px; padding: 5px 10px; text-align: left;">📦 Package Manager</button>
            </div>
        </div>

        <div id="variables-container">
            <div class="variables-header">
                <span>Global Variables</span>
                <div style="display: flex; gap: 4px;">
                    <button id="add-variable-btn" style="padding: 2px 8px; font-size: 11px;">+ Add</button>
                    <button id="save-variables-btn" style="padding: 2px 8px; font-size: 11px; display: none;">Save</button>
                </div>
            </div>
            <div id="variables-list" style="max-height: 200px; overflow-y: auto; overflow-x: hidden; padding: 4px 8px;">
                <div class="no-sessions">Loading...</div>
            </div>
        </div>

        <div id="active-sessions-container">
            <div class="active-sessions-header">
                <span>Sessions</span>
            </div>
            <div id="sessions-stacks">
                <div class="sessions-stack-section">
                    <span class="stack-label">Running</span>
                    <div id="active-sessions-list">
                        <div class="no-sessions">None</div>
                    </div>
                </div>
                <div class="sessions-stack-section">
                    <span class="stack-label">Recently Stopped</span>
                    <div id="stopped-sessions-list">
                        <div class="no-sessions">None</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="history-container">
            <div class="history-header">
                <span>History (Undo / Redo)</span>
                <div style="display: flex; gap: 4px;">
                    <button id="undo-btn" style="padding: 2px 8px; font-size: 11px;">Undo</button>
                    <button id="redo-btn" style="padding: 2px 8px; font-size: 11px;">Redo</button>
                    <button id="clear-history-btn" style="padding: 2px 8px; font-size: 11px;">Clear</button>
                </div>
            </div>
            <div id="history-stacks">
                <div class="history-stack-section">
                    <span class="stack-label">Undo Stack</span>
                    <div id="undo-stack-list" class="stack-list"></div>
                </div>
                <div class="history-stack-section">
                    <span class="stack-label">Redo Stack</span>
                    <div id="redo-stack-list" class="stack-list"></div>
                </div>
            </div>
        </div>

        <div id="state-editor-container">


            <div class="state-editor-header">
                <span>Initial State (JSON)</span>
                <button id="format-json" style="padding: 2px 8px; font-size: 11px;">Format</button>
            </div>
            <textarea id="state-json-input">{"input": ""}</textarea>
        </div>
    </div>

    <!-- Current State Widget (Bottom Left) -->
    <div id="current-state-container">
        <div class="resize-handle top"></div>
        <div class="current-state-header">
            <span>Current State (Live)</span>
            <div style="display: flex; gap: 4px;">
                <button id="view-state-full"
                    style="padding: 2px 6px; font-size: 10px; background: #1e40af; border-color: #1e3a8a;">View</button>
                <button id="toggle-state" style="padding: 2px 6px; font-size: 10px;">Collapse</button>
            </div>
        </div>
        <div id="current-state-content">
            <div class="no-state">No active state available</div>
        </div>
    </div>

    <style>
        #log-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #444;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            display: flex;
            flex-direction: column;
            z-index: 90;
            transition: height 0.3s ease, bottom 0.3s ease, opacity 0.3s ease;
            opacity: 0.8;
        }

        #log-container:hover {
            opacity: 1;
        }

        #log-container.resizing {
            transition: none;
        }

        #log-container.collapsed {
            height: 35px !important;
        }

        #log-container.expanded {
            height: 250px;
            min-height: 100px;
        }

        .resize-handle {
            position: absolute;
            background: transparent;
            z-index: 101;
        }

        .resize-handle.top {
            top: -4px;
            left: 0;
            right: 0;
            height: 8px;
            cursor: ns-resize;
        }

        .resize-handle.top:hover {
            background: rgba(59, 130, 246, 0.4);
        }

        .log-header {
            padding: 8px 12px;
            background: rgba(40, 40, 40, 0.8);
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #aaa;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }


        #log-content {
            flex: 1;
            padding: 10px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 12px;
            color: #d1d5db;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .log-entry {
            margin-bottom: 6px;
            border-left: 2px solid #444;
            padding-left: 8px;
            white-space: pre-wrap;
            display: flex;
            align-items: flex-start;
            line-height: 1.4;
            position: relative;
        }

        .log-copy-btn {
            opacity: 0;
            cursor: pointer;
            padding: 2px 6px;
            background: rgba(60, 60, 60, 0.8);
            border: 1px solid #444;
            border-radius: 4px;
            color: #aaa;
            font-size: 9px;
            margin-left: 8px;
            transition: all 0.2s ease;
            flex-shrink: 0;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .log-entry:hover .log-copy-btn {
            opacity: 1;
        }

        .log-copy-btn:hover {
            color: #fff;
            background: #4b5563;
            border-color: #6b7280;
        }

        .log-copy-btn.copied {
            color: #10b981;
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .log-timestamp {
            color: #6b7280;
            margin-right: 8px;
            font-size: 10px;
            flex-shrink: 0;
            font-weight: normal;
            font-family: 'Fira Code', 'Courier New', monospace;
            padding-top: 1px;
        }

        .log-message {
            flex: 1;
            word-break: break-word;
            overflow: hidden;
        }

        /* Collapsible Log Entries */
        .log-entry.collapsible {
            cursor: pointer;
            position: relative;
            padding-right: 20px;
        }

        .log-entry.collapsible:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .log-entry.collapsed .log-message {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            line-clamp: 1;
            -webkit-box-orient: vertical;
            white-space: pre-wrap;
            /* important for line clamp to work with segments */
        }

        .log-entry.collapsible::after {
            content: "▼";
            position: absolute;
            right: 8px;
            top: 4px;
            font-size: 8px;
            color: #6b7280;
            transition: transform 0.2s;
        }

        .log-entry.collapsed::after {
            transform: rotate(-90deg);
        }

        .log-entry.info {
            border-color: #3b82f6;
        }

        .log-entry.completion {
            border-color: #10b981;
        }

        .log-entry.error {
            border-color: #ef4444;
            color: #f87171;
        }


        #right-sidebar {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 320px;
            height: calc(100vh - 100px);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease, right 0.3s ease, height 0.3s ease;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid #444;
            border-bottom: none;
            border-right: none;
            border-radius: 8px 0 0 0;
            box-shadow: -4px 0 24px rgba(0, 0, 0, 0.5);
            opacity: 0.8;
        }

        #right-sidebar:hover {
            opacity: 1;
        }

        #right-sidebar:hover {
            opacity: 1;
        }

        #right-sidebar.collapsed {
            height: 35px !important;
        }

        #right-sidebar-toggler {
            background: rgba(40, 40, 40, 0.8);
            border-bottom: 1px solid #444;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ccc;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        #state-editor-container {
            flex: 1;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 1px solid #444;
        }

        .state-editor-header {
            padding: 6px 12px;
            background: rgba(40, 40, 40, 0.4);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #888;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        #state-json-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #10b981;
            /* Greenish/Terminal feel */
            padding: 10px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
        }

        #variables-container {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 1px solid #444;
        }

        .variables-header {
            padding: 6px 12px;
            background: rgba(40, 40, 40, 0.4);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #888;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .variable-row {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px 0;
            font-size: 11px;
            transition: opacity 0.15s;
        }

        .variable-row.var-dragging {
            opacity: 0.4;
        }

        .variable-row.var-drag-over {
            outline: 1px solid #3b82f6;
            border-radius: 3px;
        }

        .var-drag-handle {
            color: #555;
            cursor: grab;
            padding: 0 2px;
            font-size: 13px;
            flex-shrink: 0;
            user-select: none;
            line-height: 1;
        }

        .var-drag-handle:hover {
            color: #888;
        }

        .var-drag-handle:active {
            cursor: grabbing;
        }

        /* ── Graph Explorer panel ───────────────────────────────────────── */

        #graph-explorer-panel {
            position: fixed;
            top: 48px;
            left: 10px;
            width: 270px;
            max-height: calc(100vh / 0.9 - 80px);
            background: rgba(14, 14, 14, 0.97);
            border: 1px solid #2a2a2a;
            border-top: none;
            border-radius: 0 0 8px 8px;
            display: none;
            flex-direction: column;
            z-index: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            font-size: 11px;
        }

        .ge-search-wrap {
            padding: 7px 8px;
            border-bottom: 1px solid #1e1e1e;
            flex-shrink: 0;
        }

        .ge-search {
            width: 100%;
            box-sizing: border-box;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 5px 8px;
            color: #ccc;
            font-size: 11px;
            outline: none;
        }

        .ge-search:focus { border-color: #3b82f6; }

        .ge-tree {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
            min-height: 60px;
        }

        .ge-folder {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 4px 8px;
            cursor: pointer;
            color: #aaa;
            user-select: none;
        }

        .ge-folder:hover { background: #1a1a1a; }

        .ge-arrow {
            color: #555;
            font-size: 9px;
            width: 10px;
            flex-shrink: 0;
        }

        .ge-graph {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            cursor: pointer;
            color: #bbb;
            border-radius: 3px;
            margin: 0 4px;
        }

        .ge-graph:hover { background: #1e1e1e; }
        .ge-graph:hover .ge-trash { opacity: 1; }

        .ge-graph-active {
            background: #1e3a5f !important;
            color: #60a5fa;
        }

        .ge-graph-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ge-trash {
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0;
            color: #ef4444;
            padding: 0 2px;
            font-size: 10px;
            flex-shrink: 0;
            transition: opacity 0.1s;
        }

        .ge-empty {
            color: #444;
            font-size: 11px;
            padding: 16px;
            text-align: center;
        }

        .ge-gh-bar {
            border-top: 1px solid #1e1e1e;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
        }

        .ge-gh-label {
            font-size: 9px;
            color: #555;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .ge-gh-row {
            display: flex;
            gap: 5px;
        }

        .ge-gh-input {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 4px 6px;
            color: #ccc;
            font-size: 10px;
            outline: none;
        }

        .ge-gh-input:focus { border-color: #3b82f6; }

        .ge-gh-btn {
            padding: 4px 10px;
            font-size: 10px;
            background: #3b82f6;
            border-color: #2563eb;
            color: #fff;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ge-gh-msg {
            font-size: 10px;

            margin-bottom: 12px;
        }
        .mod-load-error-title {
            color: #fb923c;
            font-weight: 600;
            font-size: 11px;
            margin-bottom: 6px;
        }
        .mod-load-error-pre {
            color: #fdba74;
            font-size: 10px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
            max-height: 220px;
            overflow-y: auto;
            line-height: 1.5;
        }
        .pm-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 2px;
        }
        .pm-card-nodes {
            font-size: 10px;
            color: #444;
        }
        .pm-card-view {
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: #999;
            cursor: pointer;
        }
        .pm-card-view:hover { background: #252525; color: #ccc; border-color: #444; }
        .pm-empty {
            text-align: center;
            color: #444;
            font-size: 12px;
            padding: 60px 0;
        }
        .pm-stats {
            font-size: 10px;
            color: #444;
            margin-bottom: 14px;
        }

        /* Module detail modal */
        .mod-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: modFadeIn 0.15s ease;
        }
        @keyframes modFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .mod-modal {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            width: 480px;
            max-width: 95vw;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .mod-modal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid #2a2a2a;
            border-top: 3px solid #666;
            border-radius: 8px 8px 0 0;
        }
        .mod-modal-header h3 {
            flex: 1;
            margin: 0;
            font-size: 13px;
            font-weight: 600;
            color: #e0e0e0;
        }
        .mod-modal-version {
            font-size: 10px;
            color: #666;
            background: #252525;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .mod-modal-sha {
            font-size: 10px;
            font-family: monospace;
            color: #aaa;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: default;
        }
        .mod-modal-close {
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            padding: 0 2px;
            line-height: 1;
        }
        .mod-modal-close:hover { color: #ccc; }
        .mod-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .mod-modal-desc {
            color: #888;
            font-size: 11px;
            line-height: 1.5;
            margin: 0;
        }
        .mod-section-title {
            font-size: 10px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        .mod-source-url {
            margin: 8px 0;
            font-size: 11px;
        }
        .mod-source-url a {
            color: #a78bfa;
            text-decoration: none;
            word-break: break-all;
        }
        .mod-source-url a:hover {
            text-decoration: underline;
        }
        .mod-nodes-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .mod-node-chip {
            background: #252525;
            color: #aaa;
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 3px;
            font-family: 'Fira Code', monospace;
        }
        .mod-env-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .mod-env-label {
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            color: #aaa;
            min-width: 160px;
            flex-shrink: 0;
        }
        .mod-env-input {
            flex: 1;
            background: #252525;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            padding: 4px 7px;
            outline: none;
        }
        .mod-env-input:focus {
            border-color: #555;
        }
        .mod-env-status {
            font-size: 12px;
            flex-shrink: 0;
        }
        .mod-env-status.set   { color: #10b981; }
        .mod-env-status.unset { color: #555; }
        .mod-step-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 7px 9px;
            border-radius: 4px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 4px;
            font-size: 10px;
        }
        .mod-step-icon { flex-shrink: 0; font-size: 11px; }
        .mod-step-text { color: #aaa; line-height: 1.5; flex: 1; }
        .mod-step-cmd {
            font-family: 'Fira Code', monospace;
            color: #ccc;
            margin-bottom: 2px;
        }
        .mod-step-available { color: #10b981; font-size: 9px; }
        .mod-step-missing   { color: #ef4444; font-size: 9px; }
        .mod-step-hint {
            color: #555;
            font-size: 9px;
            font-family: 'Fira Code', monospace;
            margin-top: 2px;
        }
        .mod-manual-step {
            background: rgba(245,158,11,0.1);
            border-left: 3px solid #f59e0b;
            padding: 7px 9px;
            border-radius: 0 4px 4px 0;
            margin-bottom: 4px;
        }
        .mod-manual-step-label {
            font-size: 9px;
            color: #f59e0b;
            font-weight: 600;
            margin-bottom: 3px;
        }
        .mod-manual-step-cmd {
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            color: #ddd;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mod-copy-btn {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            border: 1px solid #555;
            background: #2a2a2a;
            color: #888;
            cursor: pointer;
            flex-shrink: 0;
        }
        .mod-copy-btn:hover { color: #ccc; background: #333; }
        .mod-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid #2a2a2a;
        }
        .mod-btn {
            font-size: 11px;
            padding: 5px 14px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        .mod-btn-primary {
            background: #2563eb;
            color: #fff;
        }
        .mod-btn-primary:hover { background: #1d4ed8; }
        .mod-btn-danger {
            background: rgba(239,68,68,0.15);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.3);
        }
        .mod-btn-danger:hover { background: rgba(239,68,68,0.25); }
        .mod-btn-update {
            background: rgba(74,222,128,0.1);
            color: #4ade80;
            border: 1px solid rgba(74,222,128,0.25);
        }
        .mod-btn-update:hover { background: rgba(74,222,128,0.2); }
        .mod-btn-cancel {
            background: #252525;
            color: #888;
            border: 1px solid #333;
        }
        .mod-btn-cancel:hover { background: #2a2a2a; color: #ccc; }
        .pm-restart-banner {
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.3);
            border-radius: 6px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
        }
        .pm-restart-banner span {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            color: #f59e0b;
        }
        .pm-restart-banner button {
            background: rgba(245,158,11,0.2);
            color: #f59e0b;
            border: 1px solid rgba(245,158,11,0.4);
            border-radius: 5px;
            padding: 6px 18px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .pm-restart-banner button:hover { background: rgba(245,158,11,0.35); }
        .pm-restart-banner button:disabled { opacity: 0.6; cursor: default; }
        .mod-success-msg {
            background: rgba(16,185,129,0.1);
            border-left: 3px solid #10b981;
            color: #10b981;
            font-size: 10px;
            padding: 6px 9px;
            border-radius: 0 4px 4px 0;
        }

        /* Providers panel (LLM module) */
        .mod-prov-section {
            margin-top: 4px;
        }
        .mod-prov-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .mod-prov-header .mod-section-title {
            margin-bottom: 0;
        }
        .mod-prov-actions {
            display: flex;
            gap: 6px;
        }
        .mod-prov-add-btn,
        .mod-prov-save-btn {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid #444;
            cursor: pointer;
            color: #ccc;
        }
        .mod-prov-add-btn {
            background: #252525;
        }
        .mod-prov-add-btn:hover { background: #2e2e2e; color: #fff; }
        .mod-prov-save-btn {
            background: #1d4ed8;
            border-color: #2563eb;
            color: #fff;
        }
        .mod-prov-save-btn:hover { background: #1e40af; }
        .mod-prov-save-btn:disabled { opacity: 0.6; cursor: default; }

        .mod-prov-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .mod-prov-row {
            background: #1e1e1e;
            border: 1px solid #2e2e2e;
            border-radius: 5px;
            padding: 8px 10px;
        }
        .mod-prov-top {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mod-prov-name {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            padding: 3px 7px;
            min-width: 0;
        }
        .mod-prov-name:focus { border-color: #555; outline: none; }
        .mod-prov-type {
            background: #252525;
            border: 1px solid #333;
            border-radius: 4px;
            color: #aaa;
            font-size: 10px;
            padding: 3px 6px;
            cursor: pointer;
        }
        .mod-prov-del {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 11px;
            padding: 0 2px;
            flex-shrink: 0;
        }
        .mod-prov-del:hover { color: #ef4444; }
        .mod-prov-opts {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 7px;
        }
        .mod-prov-opt-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .mod-prov-opt-label {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            min-width: 60px;
        }
        .mod-prov-opt-input {
            flex: 1;
            background: #111;
            border: 1px solid #2e2e2e;
            border-radius: 3px;
            color: #ccc;
            font-size: 10px;
            font-family: 'Fira Code', monospace;
            padding: 2px 6px;
        }
        .mod-prov-opt-input:focus { border-color: #444; outline: none; }
        .mod-prov-status-detail {
            margin-top: 6px;
        }
        .mod-prov-field-error {
            border-color: #ef4444 !important;
        }
        .mod-prov-error {
            color: #ef4444;
            font-size: 9px;
            margin-top: 5px;
        }
        .mod-prov-save-error {
            color: #ef4444;
            font-size: 9px;
            margin-top: 4px;
            padding: 0 2px;
        }

        /* ── Missing Modules Dialog ────────────────────────────────── */
        .missing-modules-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(3px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: modFadeIn 0.15s ease;
        }
        .missing-modules-dialog {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            width: 420px;
            max-width: 92vw;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .missing-modules-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 18px 20px 14px;
            border-bottom: 1px solid #2a2a2a;
        }
        .missing-modules-icon {
            font-size: 28px;
            line-height: 1;
            flex-shrink: 0;
        }
        .missing-modules-title {
            font-size: 15px;
            font-weight: 700;
            color: #f5f5f5;
        }
        .missing-modules-subtitle {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        .missing-modules-close {
            margin-left: auto;
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            flex-shrink: 0;
        }
        .missing-modules-close:hover { color: #ccc; }

        .missing-modules-list {
            padding: 10px 16px;
            overflow-y: auto;
            flex: 1;
        }
        .missing-modules-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 8px;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .missing-modules-row:hover {
            background: rgba(255,255,255,0.03);
        }
        .missing-modules-row + .missing-modules-row {
            border-top: 1px solid #222;
        }
        .missing-modules-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .missing-modules-info {
            flex: 1;
            min-width: 0;
        }
        .missing-modules-name {
            font-size: 13px;
            font-weight: 600;
            color: #e5e5e5;
        }
        .missing-modules-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }
        .missing-modules-url {
            font-size: 11px;
            color: #60a5fa;
            text-decoration: none;
            display: block;
            margin-top: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .missing-modules-url:hover { text-decoration: underline; color: #93bbfd; }
        .missing-modules-chip {
            font-size: 10px;
            padding: 1px 6px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3px;
            color: #aaa;
            font-family: monospace;
        }
        .missing-modules-install {
            padding: 5px 14px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .missing-modules-install:hover { background: #2563eb; }
        .missing-modules-install:disabled { opacity: 0.6; cursor: default; }
        .missing-modules-install.installed {
            background: #059669;
            cursor: default;
        }
        .missing-modules-footer {
            padding: 12px 20px;
            border-top: 1px solid #2a2a2a;
            display: flex;
            justify-content: flex-end;
        }
        .missing-modules-dismiss {
            padding: 5px 16px;
            background: transparent;
            color: #888;
            border: 1px solid #444;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }
        .missing-modules-dismiss:hover { color: #ccc; border-color: #666; }
        .missing-modules-badge-error {
            font-size: 10px;
            padding: 3px 10px;
            background: rgba(239,68,68,0.15);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .missing-modules-badge-unknown {
            font-size: 10px;
            padding: 3px 10px;
            background: rgba(161,161,170,0.12);
            color: #a1a1aa;
            border: 1px solid rgba(161,161,170,0.25);
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }
    </style>
    <script type="module" src="/main.js"></script>
</body>
